<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password · MASON</title>
  <link rel="icon" type="image/png" href="assets/mason_mark_grid.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-extra.css" />
  <link rel="stylesheet" href="styles-theme.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="icons.jsx?v=2"></script>
  <script type="text/babel" src="auth.jsx?v=2"></script>
  <script type="text/babel">
    function ForgotPage() {
      const [stage, setStage] = React.useState("email"); // email | code | reset
      const [code, setCode] = React.useState(["","","","","",""]);
      const refs = React.useRef([]);

      const onCode = (i, v) => {
        const c = [...code];
        c[i] = v.slice(-1).toUpperCase();
        setCode(c);
        if (v && i < 5) refs.current[i+1]?.focus();
      };

      return (
        <AuthShell visual={<ForgotVisual />}>
          <form className="auth-form" onSubmit={(e) => { e.preventDefault();
            if (stage === "email") setStage("code");
            else if (stage === "code") setStage("reset");
          }}>
            <div className="auth-steps">
              <b className={stage==='email'?'':'is-done'} style={{color: stage==='email'?'var(--accent)':'var(--text-muted)'}}>01 Email</b>
              <i>—</i>
              <b style={{color: stage==='code'?'var(--accent)':'var(--text-faint)'}}>02 Code</b>
              <i>—</i>
              <b style={{color: stage==='reset'?'var(--accent)':'var(--text-faint)'}}>03 New password</b>
            </div>

            {stage === "email" && (
              <>
                <div className="auth-form__title">
                  <h1>Reset your password.</h1>
                  <p>Enter the email on your account. We’ll send a 6-digit code.</p>
                </div>
                <fieldset>
                  <div className="field">
                    <label htmlFor="email">Email</label>
                    <input id="email" type="email" autoComplete="email" placeholder="you@yourcompany.com" autoFocus />
                  </div>
                </fieldset>
                <button className="btn btn-primary" type="submit">
                  Send code <IconArrowRight size={16} stroke={2} />
                </button>
              </>
            )}

            {stage === "code" && (
              <>
                <div className="auth-form__title">
                  <h1>Check your email.</h1>
                  <p>We sent a 6-digit code to your inbox. It expires in 10 minutes.</p>
                </div>
                <div className="field">
                  <label>Verification code</label>
                  <div className="code-row">
                    {code.map((c, i) => (
                      <input
                        key={i}
                        ref={(el) => refs.current[i] = el}
                        value={c}
                        onChange={(e) => onCode(i, e.target.value)}
                        inputMode="numeric"
                        maxLength={1}
                      />
                    ))}
                  </div>
                </div>
                <button className="btn btn-primary" type="submit" disabled={code.join("").length < 6}>
                  Verify code <IconArrowRight size={16} stroke={2} />
                </button>
                <div className="auth-form__foot">
                  Didn’t get it? <a href="#" onClick={(e) => { e.preventDefault(); setStage("email"); }}>Resend code</a>
                </div>
              </>
            )}

            {stage === "reset" && (
              <>
                <div className="auth-form__title">
                  <h1>Choose a new password.</h1>
                  <p>You’ll be signed out of other devices.</p>
                </div>
                <fieldset>
                  <div className="field">
                    <label htmlFor="np">New password</label>
                    <input id="np" type="password" autoComplete="new-password" placeholder="At least 12 characters" autoFocus />
                  </div>
                  <div className="field">
                    <label htmlFor="cp">Confirm password</label>
                    <input id="cp" type="password" autoComplete="new-password" placeholder="Re-enter password" />
                  </div>
                </fieldset>
                <a href="MASON Sign In.html" className="btn btn-primary" style={{ textDecoration: "none" }}>
                  Update password &amp; sign in <IconArrowRight size={16} stroke={2} />
                </a>
              </>
            )}

            <div className="auth-form__foot" style={{ marginTop: 8 }}>
              Remembered it? <a href="MASON Sign In.html">Back to sign in →</a>
            </div>
          </form>
        </AuthShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<ForgotPage />);
  </script>
</body>
</html>
