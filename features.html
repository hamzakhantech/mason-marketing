  <style>
    .module-tabs-wrap {
      position: sticky;
      top: 64px;
      z-index: 90;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }
    .module-tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .module-tabs::-webkit-scrollbar { display: none; }
    .module-tab {
      flex-shrink: 0;
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .module-tab:hover { color: var(--text-base); }
    .module-tab.is-active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .module-detail__header {
      max-width: 760px;
      margin-bottom: 3rem;
    }
    .module-detail__body {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      margin-top: 2.5rem;
    }
    .compare-table-wrap { overflow-x: auto; }
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .compare-table th, .compare-table td {
      padding: 12px 16px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .compare-table th:first-child, .compare-table td:first-child {
      text-align: left;
      font-weight: 500;
    }
    .compare-table .compare-mason {
      background: rgba(232,148,46,.06);
      font-weight: 600;
    }
    .compare-yes { color: #4ade80; font-weight: 700; }
    .compare-no { color: #ef4444; }
    .compare-partial { color: var(--text-muted); font-size: 12px; }
    .compare-note {
      margin-top: 1rem;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
