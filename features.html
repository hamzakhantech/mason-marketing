  <style>
    .module-tabs-wrap {
      position: sticky;
      top: 64px;
      z-index: 90;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border);
      padding: 0;
    }
    .module-tabs {
      display: flex;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .module-tabs::-webkit-scrollbar { display: none; }
    .module-tab {
      flex-shrink: 0;
      padding: 14px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .module-tab:hover { color: var(--text-base); }
    .module-tab.is-active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .module-detail__header {
      max-width: 760px;
      margin-bottom: 3rem;
    }
    .module-detail__body {
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
      margin-top: 2.5rem;
    }
    .compare-table-wrap { overflow-x: auto; }
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .compare-table th, .compare-table td {
      padding: 12px 16px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .compare-table th:first-child, .compare-table td:first-child {
      text-align: left;
      font-weight: 500;
    }
    .compare-table .compare-mason {
      background: rgba(232,148,46,.06);
      font-weight: 600;
    }
    .compare-yes { color: #4ade80; font-weight: 700; }
    .compare-no { color: #ef4444; }
    .compare-partial { color: var(--text-muted); font-size: 12px; }
    .compare-note {
      margin-top: 1rem;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>

<style id="mason-index-footer-exact">
/**
 * Home footer parity — rules copied from index.html inline <style> (footer block
 * + .container + .display + .label-num + .serif-it + .btn) scoped under .footer
 * where needed so pages that load styles-v2.css match index.html exactly.
 * Load last after site-header.css.
 */

/* index.html: .container — footer shell */
.footer .container {
  width: 100% !important;
  max-width: var(--max) !important;
  margin: 0 auto !important;
  padding: 0 var(--gutter) !important;
  position: relative !important;
  z-index: 2 !important;
}

/* index.html: .display — footer CTA headline uses class "display" */
.footer .display {
  font-family: var(--font-display) !important;
  font-weight: 500 !important;
  letter-spacing: -0.035em !important;
  line-height: 0.92 !important;
}

/* index.html: .label-num */
.footer .label-num {
  font-family: var(--font-mono) !important;
  font-size: 10px !important;
  letter-spacing: 0.06em !important;
  color: var(--muted) !important;
  text-transform: uppercase !important;
}

/* index.html: .serif-it */
.footer .serif-it {
  font-family: var(--font-serif) !important;
  font-style: italic !important;
  font-weight: 400 !important;
}

/* index.html: .btn … .btn.ghost */
.footer .btn {
  display: inline-flex !important;
  align-items: center !important;
  gap: 10px !important;
  padding: 12px 18px !important;
  border: 1px solid var(--ink) !important;
  border-radius: 999px !important;
  background: transparent !important;
  color: var(--ink) !important;
  font-family: var(--font-mono) !important;
  font-size: 12px !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
  font-weight: 500 !important;
  transition: transform 0.12s ease, background 0.12s ease, color 0.12s ease !important;
  white-space: nowrap !important;
  text-decoration: none !important;
  cursor: pointer !important;
}
.footer .btn:hover {
  background: var(--ink) !important;
  color: var(--paper) !important;
}
.footer .btn.primary {
  background: var(--accent) !important;
  border-color: var(--accent) !important;
  color: #0b0b0b !important;
}
.footer .btn.primary:hover {
  background: #0b0b0b !important;
  color: var(--paper) !important;
  border-color: #0b0b0b !important;
}
.footer .btn.ghost {
  border-color: var(--rule-soft) !important;
}

/* index.html footer block */
.footer {
  background: var(--ink) !important;
  color: var(--paper) !important;
  position: relative !important;
  overflow: hidden !important;
}

.footer-top {
  border-bottom: 1px solid rgba(242, 238, 229, 0.15) !important;
  padding: 80px 0 60px !important;
  display: grid !important;
  grid-template-columns: 1.4fr 1fr 1fr 1fr !important;
  gap: 56px !important;
  align-items: start !important;
}
@media (max-width: 900px) {
  .footer-top {
    grid-template-columns: 1fr 1fr !important;
  }
}
@media (max-width: 560px) {
  .footer-top {
    grid-template-columns: 1fr !important;
  }
}

.footer-cta h2,
.footer-cta h2.display {
  font-family: var(--font-display) !important;
  font-weight: 500 !important;
  font-size: clamp(40px, 5vw, 64px) !important;
  line-height: 0.95 !important;
  letter-spacing: -0.035em !important;
  margin: 0 0 18px !important;
  max-width: 14ch !important;
}
.footer-cta h2 em,
.footer-cta h2.display em {
  font-family: var(--font-serif) !important;
  font-style: italic !important;
  font-weight: 400 !important;
}

.footer-col h5 {
  font-family: var(--font-mono) !important;
  font-size: 11px !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
  color: var(--accent) !important;
  margin: 0 0 18px !important;
  font-weight: 500 !important;
}
.footer-col ul {
  list-style: none !important;
  padding: 0 !important;
  margin: 0 !important;
  display: flex !important;
  flex-direction: column !important;
  gap: 10px !important;
}
.footer-col a {
  font-size: 15px !important;
  opacity: 0.85 !important;
  transition: opacity 0.12s ease !important;
}
.footer-col a:hover {
  opacity: 1 !important;
  color: var(--accent) !important;
}

.footer-mid {
  padding: 30px 0 22px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  border-bottom: 1px solid rgba(242, 238, 229, 0.15) !important;
  gap: 20px !important;
  flex-wrap: wrap !important;
}
.footer-mid .ml {
  display: flex !important;
  align-items: center !important;
  gap: 10px !important;
  border: 1px solid rgba(242, 238, 229, 0.2) !important;
  border-radius: 999px !important;
  padding: 6px 6px 6px 16px !important;
  min-width: 320px !important;
  max-width: 100% !important;
}
.footer-mid .ml input {
  background: transparent !important;
  border: 0 !important;
  outline: 0 !important;
  color: var(--paper) !important;
  font-family: var(--font-mono) !important;
  font-size: 12px !important;
  flex: 1 !important;
  padding: 8px 0 !important;
}
.footer-mid .ml input::placeholder {
  color: rgba(242, 238, 229, 0.5) !important;
}
.footer-mid .ml button {
  background: var(--accent) !important;
  color: #0b0b0b !important;
  border: 0 !important;
  padding: 8px 14px !important;
  border-radius: 999px !important;
  font-family: var(--font-mono) !important;
  font-size: 11px !important;
  letter-spacing: 0.06em !important;
  text-transform: uppercase !important;
  font-weight: 600 !important;
  cursor: pointer !important;
}
.footer-mid .socials {
  display: flex !important;
  gap: 8px !important;
}
.footer-mid .socials a {
  width: 36px !important;
  height: 36px !important;
  border: 1px solid rgba(242, 238, 229, 0.2) !important;
  border-radius: 50% !important;
  display: grid !important;
  place-items: center !important;
  font-family: var(--font-mono) !important;
  font-size: 12px !important;
  color: var(--paper) !important;
  text-decoration: none !important;
  transition: background 0.12s ease, color 0.12s ease !important;
}
.footer-mid .socials a:hover {
  background: var(--accent) !important;
  color: #0b0b0b !important;
  border-color: var(--accent) !important;
}

.footer-mark {
  font-family: var(--font-display) !important;
  font-weight: 500 !important;
  letter-spacing: -0.05em !important;
  font-size: clamp(120px, 26vw, 420px) !important;
  line-height: 0.82 !important;
  text-align: center !important;
  padding: 40px 0 0 !important;
  position: relative !important;
  user-select: none !important;
  color: var(--paper) !important;
}
.footer-mark .o-dot {
  display: inline-block !important;
  width: 0.6em !important;
  height: 0.6em !important;
  background: var(--accent) !important;
  border-radius: 50% !important;
  vertical-align: -0.04em !important;
  margin: 0 0.02em !important;
}

.footer-base {
  border-top: 1px solid rgba(242, 238, 229, 0.15) !important;
  padding: 22px 0 28px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: space-between !important;
  font-family: var(--font-mono) !important;
  font-size: 11px !important;
  letter-spacing: 0.08em !important;
  text-transform: uppercase !important;
  color: rgba(242, 238, 229, 0.6) !important;
  gap: 20px !important;
  flex-wrap: wrap !important;
}
.footer-base .links {
  display: flex !important;
  gap: 22px !important;
}
.footer-base .links a {
  color: inherit !important;
  text-decoration: none !important;
}
.footer-base .links a:hover {
  color: var(--accent) !important;
}

.footer-bg {
  position: absolute !important;
  inset: 0 !important;
  background-image: linear-gradient(to right, rgba(242, 238, 229, 0.05) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(242, 238, 229, 0.05) 1px, transparent 1px) !important;
  background-size: 80px 80px !important;
  pointer-events: none !important;
}

</style>
