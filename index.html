<style>
:root {

  --muted:        #5A574E;
  --accent:       #f0a84a;
  --accent-ink:   #0E0E0E;
  --safety:       #FFD400;
  --good:         #1F7A4D;
  --bad:          #C0392B;
  --font-display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
  --font-body:    "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
  --font-mono:    "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-serif:   "Instrument Serif", ui-serif, Georgia, serif;
  --max:          1440px;
  --gutter:       40px;
}
@media (max-width: 720px) { :root { --gutter: 20px; } }
.dark {
  --paper:     #0B0B0B;
  --paper-2:   #131313;
  --ink:       #F2EEE5;
  --ink-2:     #E8E2D2;
  --rule:      #F2EEE5;
  --rule-soft: rgba(242,238,229,.22);
  --rule-faint:rgba(242,238,229,.10);
  --muted:     #9A9588;
  --accent:    #f0a84a;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:var(--paper); color:var(--ink); font-family:var(--font-body); font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
body { background-image: linear-gradient(to right, var(--rule-faint) 1px, transparent 1px), linear-gradient(to bottom, var(--rule-faint) 1px, transparent 1px); background-size:80px 80px; background-position:-1px -1px; }
a { color:inherit; text-decoration:none; }
button { font-family:inherit; cursor:pointer; }
img { max-width:100%; display:block; }
.display { font-family:var(--font-display); font-weight:500; letter-spacing:-0.035em; line-height:0.92; }
.mono, .label { font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; }
.label-num { font-family:var(--font-mono); font-size:10px; letter-spacing:0.06em; color:var(--muted); text-transform:uppercase; }
.serif-it { font-family:var(--font-serif); font-style:italic; font-weight:400; }
.container { width:100%; max-width:var(--max); margin:0 auto; padding:0 var(--gutter); position:relative; }
.rule { height:1px; background:var(--rule); border:0; }
.rule-soft { height:1px; background:var(--rule-soft); border:0; }
.section-tag { display:inline-flex; align-items:center; gap:10px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink); }
.section-tag::before { content:""; width:8px; height:8px; background:var(--accent); border-radius:50%; display:inline-block; }
.btn { display:inline-flex; align-items:center; gap:10px; padding:12px 18px; border:1px solid var(--ink); border-radius:999px; background:transparent; color:var(--ink); font-family:var(--font-mono); font-size:12px; letter-spacing:0.08em; text-transform:uppercase; font-weight:500; transition:transform .12s ease, background .12s ease, color .12s ease; white-space:nowrap; }
.btn:hover { background:var(--ink); color:var(--paper); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#0B0B0B; }
.btn.primary:hover { background:#0B0B0B; color:var(--paper); border-color:#0B0B0B; }
.btn.ghost { border-color:var(--rule-soft); }
.header-wrap { position:sticky; top:0; z-index:50; background:var(--paper); border-bottom:1px solid var(--ink); }
.ticker { height:30px; border-bottom:1px solid var(--ink); overflow:hidden; font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; text-transform:uppercase; display:flex; align-items:stretch; background:var(--ink); color:var(--paper); }
.ticker .badge { display:flex; align-items:center; gap:8px; padding:0 14px; background:var(--accent); color:#0B0B0B; border-right:1px solid var(--ink); font-weight:600; }
.ticker .badge .pulse { width:7px; height:7px; border-radius:50%; background:#0B0B0B; animation:pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
.ticker .scroll { flex:1; display:flex; align-items:center; overflow:hidden; position:relative; mask:linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent); }
.ticker .scroll-track { display:flex; gap:48px; white-space:nowrap; animation:scroll 50s linear infinite; padding-left:24px; }
@keyframes scroll { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.ticker .scroll-track span { display:inline-flex; align-items:center; gap:10px; }
.ticker .scroll-track i { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; font-style:normal; }
.nav { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; height:72px; gap:24px; }
.nav-left { display:flex; align-items:center; gap:28px; flex-wrap:nowrap; }
.nav-right { display:flex; align-items:center; gap:14px; justify-content:flex-end; flex-wrap:nowrap; }
.brand { display:flex; align-items:center; gap:10px; font-family:var(--font-display); font-weight:600; font-size:22px; letter-spacing:-0.02em; }
.brand-mark { width:28px; height:28px; background:var(--ink); color:var(--paper); display:grid; place-items:center; font-family:var(--font-mono); font-size:14px; font-weight:700; position:relative; }
.brand-mark::after { content:""; position:absolute; inset:3px; border:1px solid var(--paper); pointer-events:none; }
.nav-link { font-family:var(--font-mono); font-size:12px; letter-spacing:0.06em; text-transform:uppercase; font-weight:500; padding:6px 0; position:relative; display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
.nav-link:hover { color:var(--accent); }
.nav-link .caret { font-size:8px; opacity:.5; }
.hide-lg { display:initial; }

.hide-md { display:initial; }
@media (max-width:1040px) { .hide-md { display:none !important; } }
/* ── Mobile hamburger ── */
.nav-hamburger { display:none; flex-direction:column; justify-content:center; gap:5px; cursor:pointer; padding:8px 6px; background:none; border:none; margin-left:auto; }
.nav-hamburger span { display:block; width:22px; height:2px; background:var(--ink); border-radius:1px; transition:transform .2s, opacity .2s; }
@media (max-width:900px) {
  .hide-md { display:none !important; }
  .hide-lg { display:none !important; }
  .nav-hamburger { display:flex !important; }
  .nav { height:60px !important; grid-template-columns:1fr auto !important; }
}
/* ── Mobile drawer ── */
.mob-drawer-backdrop { position:fixed; inset:0; z-index:190; background:rgba(0,0,0,.45); backdrop-filter:blur(3px); }

.mob-drawer__head { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
.mob-drawer__close { background:none; border:1px solid var(--rule-soft); border-radius:4px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:18px; color:var(--ink); }
.mob-drawer a.mob-link { display:block; font-family:var(--font-mono); font-size:12px; letter-spacing:.07em; text-transform:uppercase; padding:15px 0; border-bottom:1px solid var(--rule-faint); color:var(--ink); }
.mob-drawer a.mob-link:hover { color:var(--accent); }
.mob-drawer__cta { display:flex; flex-direction:column; gap:10px; margin-top:auto; padding-top:28px; }
.mega { position:absolute; left:0; right:0; top:100%; background:var(--paper); border-top:1px solid var(--ink); border-bottom:1px solid var(--ink); padding:32px 0 28px; display:none; }
.mega.open { display:block; }
.mega-grid { display:grid; grid-template-columns:1.1fr 2fr 1.4fr; gap:56px; align-items:start; }
.mega-title { font-family:var(--font-display); font-size:32px; font-weight:500; letter-spacing:-0.025em; line-height:1; margin:0 0 12px; }
.mega-sub { color:var(--muted); font-size:14px; max-width:32ch; }
.mega-items { display:grid; grid-template-columns:1fr 1fr; gap:4px 24px; }
.mega-item { display:grid; grid-template-columns:38px 1fr auto; align-items:start; gap:12px; padding:14px 12px 14px 0; border-bottom:1px solid var(--rule-faint); transition:background .12s ease; }
.mega-item:hover { background:var(--paper-2); padding-left:8px; }
.mega-item .num { font-family:var(--font-mono); font-size:10px; color:var(--muted); padding-top:2px; }

.mega-item .desc { font-size:12px; color:var(--muted); margin-top:2px; display:block; }

.mega-feature { background:var(--ink); color:var(--paper); padding:22px 22px 18px; position:relative; overflow:hidden; min-height:220px; display:flex; flex-direction:column; justify-content:space-between; }
.mega-feature h4 { font-family:var(--font-display); font-weight:500; font-size:22px; line-height:1.05; letter-spacing:-0.02em; margin:0; }

.hero { padding:80px 0 60px; position:relative; }

.section { padding:100px 0; position:relative; }
.section-head { display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:end; margin-bottom:56px; }

.module.big .num, .module.big .desc { color:var(--paper); opacity:.9; }

.shot { background:var(--paper); color:var(--ink); border:1px solid #2a2a2a; border-radius:14px; overflow:hidden; display:grid; grid-template-columns:260px 1fr 320px; min-height:560px; box-shadow:0 40px 80px -30px rgba(0,0,0,.6), 0 2px 0 0 var(--accent); }

.panel-left .item.active .count { color:var(--paper); }
.panel-main { padding:22px 24px; position:relative; background:radial-gradient(1200px 600px at 50% 80%, rgba(255,91,20,.07), transparent 60%), var(--paper); }

.panel-main .h .t { font-family:var(--font-display); font-size:22px; font-weight:500; letter-spacing:-0.02em; }
.panel-main .h .meta { font-family:var(--font-mono); font-size:11px; color:var(--muted); }

.gantt-bar { position:absolute; top:12px; height:20px; background:var(--ink); border-radius:4px; display:flex; align-items:center; padding:0 8px; color:var(--paper); font-family:var(--font-mono); font-size:10px; letter-spacing:0.06em; }

<script type="text/babel" data-presets="env,react">
/* global React, ReactDOM, Header, Hero, Modules, Showcase, BIM, Cases, Pricing, Blog, Footer */
const { useState, useEffect } = React;

const GLOBALS = ["Header","Hero","Modules","Showcase","BIM","Cases","Pricing","Blog","Footer"];

const App = () => {
  const [dark, setDark] = useState(() => document.documentElement.getAttribute("data-theme") !== "light");

  useEffect(() => {
    const theme = dark ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", theme);
    if (dark) document.documentElement.classList.add("dark");
    else document.documentElement.classList.remove("dark");
    try {
      localStorage.setItem("mason-theme", theme);
    } catch (e) {}
  }, [dark]);

  useEffect(() => {
    const onStorage = (e) => {
      if (e.key !== "mason-theme") return;
      if (e.newValue === "light") setDark(false);
      else if (e.newValue === "dark") setDark(true);
    };
    window.addEventListener("storage", onStorage);
    return () => window.removeEventListener("storage", onStorage);
  }, []);

  return (
    <>
      <Header dark={dark} toggleDark={() => setDark(d => !d)} />
      <main>
        <Hero />
        <hr className="rule" />
        <Modules />
        <Showcase />
        <BIM />
        <Cases />
        <Pricing />
        <Blog />
      </main>
      <Footer />
    </>
  );
};

const waitAndRender = () => {
  const missing = GLOBALS.filter(g => !window[g]);
  if (missing.length > 0) { setTimeout(waitAndRender, 80); return; }
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
};
waitAndRender();
</script>
