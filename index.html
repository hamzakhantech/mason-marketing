<style>/* ============================================================
   MASON — Blueprint Industrial
   ============================================================ */

:root {
  --paper:        #F2EEE5;
  --paper-2:      #EAE4D6;
  --ink:          #0E0E0E;
  --ink-2:        #1A1A1A;
  --rule:         #1A1A1A;
  --rule-soft:    rgba(14,14,14,.18);
  --rule-faint:   rgba(14,14,14,.08);
  --muted:        #5A574E;
  --accent:       #FF5B14;     /* construction orange — overridden by tweak */
  --accent-ink:   #0E0E0E;
  --safety:       #FFD400;
  --good:         #1F7A4D;
  --bad:          #C0392B;

  --font-display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
  --font-body:    "IBM Plex Sans", ui-sans-serif, system-ui, sans-serif;
  --font-mono:    "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --font-serif:   "Instrument Serif", ui-serif, Georgia, serif;

  --max:          1440px;
  --gutter:       40px;
}

@media (max-width: 720px) { :root { --gutter: 20px; } }

/* dark mode override via .dark class */
.dark {
  --paper:        #0B0B0B;
  --paper-2:      #131313;
  --ink:          #F2EEE5;
  --ink-2:        #E8E2D2;
  --rule:         #F2EEE5;
  --rule-soft:    rgba(242,238,229,.22);
  --rule-faint:   rgba(242,238,229,.10);
  --muted:        #9A9588;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  /* faint blueprint grid baseline */
  background-image:
    linear-gradient(to right, var(--rule-faint) 1px, transparent 1px),
    linear-gradient(to bottom, var(--rule-faint) 1px, transparent 1px);
  background-size: 80px 80px;
  background-position: -1px -1px;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img { max-width: 100%; display: block; }

/* ─── Typography ─────────────────────────────────────────── */

.display {
  font-family: var(--font-display);
  font-weight: 500;
  letter-spacing: -0.035em;
  line-height: 0.92;
}

.mono, .label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
}

.label-num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
}

.serif-it { font-family: var(--font-serif); font-style: italic; font-weight: 400; }

/* ─── Layout primitives ──────────────────────────────────── */

.container {
  width: 100%;
  max-width: var(--max);
  margin: 0 auto;
  padding: 0 var(--gutter);
  position: relative;
}

.rule { height: 1px; background: var(--rule); border: 0; }
.rule-soft { height: 1px; background: var(--rule-soft); border: 0; }

.section-tag {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
}
.section-tag::before {
  content: "";
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
}

/* corner ticks — those tiny technical marks at frame corners */
.ticks {
  position: absolute;
  inset: 0;
  pointer-events: none;
}
.ticks::before, .ticks::after,
.ticks > i::before, .ticks > i::after {
  content: "";
  position: absolute;
  width: 14px; height: 14px;
  border: 1px solid var(--ink);
}
.ticks::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }
.ticks::after { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }
.ticks > i::before { bottom: -1px; left: -1px; border-right: 0; border-top: 0; position:absolute; }
.ticks > i::after { bottom: -1px; right: -1px; border-left: 0; border-top: 0; position:absolute; }
.ticks > i { display:block; position: absolute; inset:0; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border: 1px solid var(--ink);
  border-radius: 999px;
  background: transparent;
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  transition: transform .12s ease, background .12s ease, color .12s ease;
}
.btn:hover { background: var(--ink); color: var(--paper); }
.btn.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0B0B0B;
}
.btn.primary:hover { background: #0B0B0B; color: var(--paper); border-color: #0B0B0B; }
.btn.ghost { border-color: var(--rule-soft); }
.btn .dot {
  width: 6px; height: 6px; background: currentColor; border-radius: 50%;
}

/* arrow ↗ */
.arr {
  display: inline-block;
  width: 1em; height: 1em;
  position: relative;
  vertical-align: -0.05em;
}
.arr::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(45deg, transparent 45%, currentColor 45%, currentColor 55%, transparent 55%) center/100% 100% no-repeat;
  mask: linear-gradient(45deg, transparent 45%, #000 45%, #000 55%, transparent 55%) center/100% 100% no-repeat;
}

/* ─── HEADER ─────────────────────────────────────────────── */

.header-wrap {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--paper);
  border-bottom: 1px solid var(--ink);
}

/* status ticker */
.ticker {
  height: 30px;
  border-bottom: 1px solid var(--ink);
  overflow: hidden;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: stretch;
  background: var(--ink);
  color: var(--paper);
}
.ticker .badge {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px;
  background: var(--accent);
  color: #0B0B0B;
  border-right: 1px solid var(--ink);
  font-weight: 600;
}
.ticker .badge .pulse {
  width: 7px; height: 7px; border-radius: 50%; background: #0B0B0B;
  animation: pulse 1.4s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
.ticker .scroll {
  flex: 1;
  display: flex;
  align-items: center;
  overflow: hidden;
  position: relative;
  mask: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
}
.ticker .scroll-track {
  display: flex;
  gap: 48px;
  white-space: nowrap;
  animation: scroll 50s linear infinite;
  padding-left: 24px;
}
@keyframes scroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
.ticker .scroll-track span { display:inline-flex; align-items:center; gap: 10px; }
.ticker .scroll-track i {
  display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
  font-style: normal;
}

/* main nav row */
.nav {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  height: 72px;
  gap: 24px;
}
.nav-left { display: flex; align-items: center; gap: 28px; }
.nav-right { display: flex; align-items: center; gap: 14px; justify-content: flex-end; }

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 22px;
  letter-spacing: -0.02em;
}
.brand-mark {
  width: 28px; height: 28px;
  background: var(--ink);
  color: var(--paper);
  display: grid; place-items: center;
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 700;
  position: relative;
}
.brand-mark::after {
  content:""; position: absolute;
  inset: 3px;
  border: 1px solid var(--paper);
  pointer-events: none;
}

.nav-link {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-weight: 500;
  padding: 6px 0;
  position: relative;
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.btn { white-space: nowrap; }
.nav-left, .nav-right { flex-wrap: nowrap; }
.hide-lg { display: initial; }
@media (max-width: 1200px) { .hide-lg { display: none !important; } }
.hide-md { display: initial; }
@media (max-width: 1040px) { .hide-md { display: none !important; } }
.nav-link .caret { font-size: 8px; opacity: .5; }
.nav-link:hover { color: var(--accent); }

/* mega menu */
.mega {
  position: absolute;
  left: 0; right: 0;
  top: 100%;
  background: var(--paper);
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 32px 0 28px;
  display: none;
}
.mega.open { display: block; }
.mega-grid {
  display: grid;
  grid-template-columns: 1.1fr 2fr 1.4fr;
  gap: 56px;
  align-items: start;
}
.mega-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1;
  margin: 0 0 12px;
}
.mega-sub { color: var(--muted); font-size: 14px; max-width: 32ch; }
.mega-items {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 24px;
}
.mega-item {
  display: grid;
  grid-template-columns: 38px 1fr auto;
  align-items: start;
  gap: 12px;
  padding: 14px 12px 14px 0;
  border-bottom: 1px solid var(--rule-faint);
  transition: background .12s ease;
}
.mega-item:hover { background: var(--paper-2); padding-left: 8px; }
.mega-item .num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  padding-top: 2px;
}
.mega-item .label {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.02em;
  text-transform: none;
  color: var(--ink);
  line-height: 1.2;
  display: block;
}
.mega-item .desc {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  display: block;
}
.mega-item .go {
  font-family: var(--font-mono);
  font-size: 16px;
  align-self: center;
}

.mega-feature {
  background: var(--ink);
  color: var(--paper);
  padding: 22px 22px 18px;
  position: relative;
  overflow: hidden;
  min-height: 220px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.mega-feature h4 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 22px;
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 0;
}
.mega-feature .vis {
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: .55;
}

/* ─── HERO ───────────────────────────────────────────────── */

.hero {
  padding: 80px 0 60px;
  position: relative;
}
.hero-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 36px;
}
.hero h1 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(56px, 11vw, 184px);
  line-height: 0.86;
  letter-spacing: -0.045em;
  margin: 0;
}
.hero h1 em {
  font-family: var(--font-serif);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.03em;
}
.hero h1 .marked {
  position: relative;
  display: inline-block;
  padding: 0 .1em;
}
.hero h1 .marked::before {
  content: "";
  position: absolute;
  left: 0; right: 0; top: 18%; bottom: 14%;
  background: var(--accent);
  z-index: -1;
}

.hero-meta {
  display: grid;
  grid-template-columns: 1.6fr 1fr 1fr;
  gap: 32px;
  align-items: end;
  margin-top: 14px;
}
@media (max-width: 920px) {
  .hero-meta { grid-template-columns: 1fr; gap: 22px; }
}

.hero-lede {
  font-size: 19px;
  line-height: 1.45;
  color: var(--ink);
  max-width: 44ch;
}
.hero-stat {
  border-left: 1px solid var(--rule-soft);
  padding-left: 16px;
}
.hero-stat .v {
  font-family: var(--font-display);
  font-size: 44px;
  line-height: 1;
  letter-spacing: -0.03em;
  font-weight: 500;
}
.hero-stat .k {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
  display: block;
}

.hero-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 32px;
  flex-wrap: wrap;
}

/* technical annotation row */
.tech-rail {
  display: flex;
  gap: 0;
  margin-top: 56px;
  border-top: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
}
.tech-rail .cell {
  flex: 1;
  padding: 14px 18px;
  border-right: 1px solid var(--rule-soft);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
  color: var(--muted);
}
.tech-rail .cell:last-child { border-right: 0; }
.tech-rail .cell b { color: var(--ink); font-weight: 600; }
.tech-rail .cell .swatch { width: 10px; height: 10px; background: var(--accent); }

/* ─── MODULES grid ───────────────────────────────────────── */

.section {
  padding: 100px 0;
  position: relative;
}
.section-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: end;
  margin-bottom: 56px;
}
.section-head h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(40px, 6vw, 84px);
  line-height: 0.94;
  letter-spacing: -0.035em;
  margin: 16px 0 0;
  max-width: 14ch;
}
.section-head .h2-side {
  font-size: 16px;
  color: var(--ink);
  max-width: 38ch;
  justify-self: end;
}
@media (max-width: 820px) {
  .section-head { grid-template-columns: 1fr; }
  .section-head .h2-side { justify-self: start; }
}

.modules {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 0;
  border-top: 1px solid var(--ink);
  border-left: 1px solid var(--ink);
}
.module {
  grid-column: span 4;
  border-right: 1px solid var(--ink);
  border-bottom: 1px solid var(--ink);
  padding: 28px 26px 26px;
  background: var(--paper);
  position: relative;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  transition: background .15s ease;
  overflow: hidden;
}
.module:hover { background: var(--paper-2); }
.module.big { grid-column: span 8; min-height: 360px; background: var(--ink); color: var(--paper); }
.module.big .num, .module.big .desc { color: var(--paper); opacity: .9; }
.module.big .name { color: var(--paper); }

.module .num {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.module .name {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 36px;
  line-height: 0.98;
  letter-spacing: -0.03em;
  margin: 14px 0 10px;
}
.module .desc {
  font-size: 14px;
  color: var(--muted);
  max-width: 30ch;
  line-height: 1.45;
}
.module .glyph {
  position: absolute;
  right: 18px;
  bottom: 18px;
  width: 64px;
  height: 64px;
  opacity: .9;
}
.module .stamp {
  position: absolute;
  top: 18px; right: 18px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border: 1px solid var(--rule-soft);
  padding: 4px 8px;
  color: var(--muted);
}
.module.big .stamp { border-color: rgba(242,238,229,.3); color: var(--paper); }

@media (max-width: 980px) {
  .module { grid-column: span 6; }
  .module.big { grid-column: span 12; }
}
@media (max-width: 640px) {
  .module { grid-column: span 12; }
}

/* ─── SHOWCASE (product mockup) ───────────────────────────── */

.showcase {
  background: var(--ink);
  color: var(--paper);
  padding: 100px 0;
  position: relative;
  overflow: hidden;
}
.showcase .section-head h2 { color: var(--paper); }
.showcase .section-head .h2-side { color: rgba(242,238,229,.7); }

.shot {
  background: var(--paper);
  color: var(--ink);
  border: 1px solid #2a2a2a;
  border-radius: 14px;
  overflow: hidden;
  display: grid;
  grid-template-columns: 260px 1fr 320px;
  min-height: 560px;
  box-shadow: 0 40px 80px -30px rgba(0,0,0,.6), 0 2px 0 0 var(--accent);
}
@media (max-width: 1100px) {
  .shot { grid-template-columns: 220px 1fr; }
  .shot .panel-right { display: none; }
}
@media (max-width: 720px) {
  .shot { grid-template-columns: 1fr; }
  .shot .panel-left { display: none; }
}

.shot-bar {
  grid-column: 1 / -1;
  height: 40px;
  background: var(--paper-2);
  border-bottom: 1px solid var(--rule-soft);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
}
.shot-bar .dots { display: flex; gap: 6px; margin-right: 8px; }
.shot-bar .dot { width: 10px; height: 10px; border-radius: 50%; background: #d6d0c0; }

.panel-left {
  border-right: 1px solid var(--rule-soft);
  padding: 18px 14px;
  background: var(--paper);
}
.panel-left .proj {
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.panel-left .proj-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.panel-left .menu { margin-top: 22px; display: flex; flex-direction: column; gap: 2px; }
.panel-left .item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 6px;
  color: var(--ink);
}
.panel-left .item.active { background: var(--ink); color: var(--paper); }
.panel-left .item .icn { width: 16px; height: 16px; opacity: .9; }
.panel-left .item .count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
}
.panel-left .item.active .count { color: var(--paper); }

.panel-main {
  padding: 22px 24px;
  position: relative;
  background:
    radial-gradient(1200px 600px at 50% 80%, rgba(255,91,20,.07), transparent 60%),
    var(--paper);
}
.panel-main .h {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 18px;
}
.panel-main .h .t {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
}
.panel-main .h .meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

.gantt {
  border: 1px solid var(--rule-soft);
  border-radius: 8px;
  overflow: hidden;
}
.gantt-row {
  display: grid;
  grid-template-columns: 200px 1fr;
  border-bottom: 1px solid var(--rule-faint);
  font-size: 13px;
}
.gantt-row:last-child { border-bottom: 0; }
.gantt-label {
  padding: 12px 14px;
  display: flex; align-items: center; gap: 8px;
  border-right: 1px solid var(--rule-faint);
}
.gantt-label .pill {
  font-family: var(--font-mono);

}

.case-grid {

}

}

  padding: 4px 8px;
}

.case-card .body { padding: 20px 22px 24px; }
.case-card .meta {

}
.case-card h3 {
  font-family: var(--font-display);

  font-family: var(--font-display);

  font-size: 22px;
  letter-spacing: -0.02em;
}
.case-card .nums .k {
  font-family: var(--font-mono);
  font-size: 10px;

.pricing { padding: 100px 0; }

}

  font-family: var(--font-mono);

}
.post .cat::before { content:""; width: 6px; height: 6px; background: var(--accent); }

  font-size: 28px;

  letter-spacing: -0.025em;
  margin: 0;
  text-wrap: balance;

.post.feat h3 { font-size: 44px; line-height: 0.98; }
.post .ex { font-size: 14px; color: var(--muted); margin: 0; }
.post .ph {
  flex: 1;
  background: var(--ink);

  overflow: hidden;
  border-radius: 4px;
  min-height: 140px;
}
.post .meta {
  margin-top: auto;

  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}

.footer {
  background: var(--ink);

}

.footer-top {
  border-bottom: 1px solid rgba(242,238,229,.15);

  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 56px;
  align-items: start;
}
@media (max-width: 900px) { .footer-top { grid-template-columns: 1fr 1fr; } }
@media (max-width: 560px) { .footer-top { grid-template-columns: 1fr; } }

.footer-cta h2 {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: clamp(40px, 5vw, 64px);
  line-height: 0.95;
  letter-spacing: -0.035em;
  margin: 0 0 18px;
  max-width: 14ch;
}
.footer-cta h2 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; }

.footer-col h5 {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 18px;
  font-weight: 500;
}
.footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.footer-col a { font-size: 15px; opacity: .85; transition: opacity .12s ease; }
.footer-col a:hover { opacity: 1; color: var(--accent); }

.footer-mid {
  padding: 30px 0 22px;

  flex-wrap: wrap;
}
.footer-mid .ml {
  display: flex; align-items: center; gap: 10px;

}

}

  .cases-grid { grid-template-columns: 1fr; }
}

.module-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 16px;
}
.module-grid .module { grid-column: span 4; }
.module-grid .module.big { grid-column: span 8; }

  .module-grid .module { grid-column: span 6; }

}

}

  font-family: var(--font-body);

  color: var(--muted);

}

  margin-top: auto;

/* ── BIM layout ──────────────────────────────────────────── */
.bim-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: start;
}
@media (max-width: 900px) {
  .bim-layout { grid-template-columns: 1fr; }
}
.bim-content { padding: 20px 0; }

/* ── Hero overrides ──────────────────────────────────────── */
.hero-h1 { margin: 16px 0; }
.hero-sub {
  font-size: clamp(15px, 1.8vw, 18px);
  color: var(--muted);
  max-width: 58ch;

  margin: 0 0 28px;
}
.hero-stats {
  display: flex;

}

/* ── Pricing extras ──────────────────────────────────────── */
.pricing-extras {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}

  .pricing-extras { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 480px) {
  .pricing-extras { grid-template-columns: 1fr; }
}

      <text x="200" y="200" textAnchor="middle" fontFamily="var(--font-mono)" fontSize="14" fill="rgba(242,238,229,.7)" letterSpacing="0.2em">4.3</text>
    </svg>
  );
  if (type === "green") return (
    <svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" style={{ position: "absolute", inset: 0 }}>
      <defs><linearGradient id="g-cult" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#1F7A4D"/><stop offset="100%" stopColor="#0E0E0E"/></linearGradient></defs>
      <rect width="400" height="300" fill="url(#g-cult)"/>
      <text x="200" y="180" textAnchor="middle" fontFamily="var(--font-serif)" fontStyle="italic" fontSize="60" fill="rgba(242,238,229,.95)">4 a.m.</text>
    </svg>
  );
  return (
    <svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" style={{ position: "absolute", inset: 0 }}>
      <rect width="400" height="300" fill="#0E0E0E"/>
      <g stroke="rgba(242,238,229,.2)" strokeWidth="1" fill="none">
        {Array.from({length:8}).map((_,i)=> <circle key={i} cx="200" cy="150" r={20+i*18}/>)}
      </g>
      <circle cx="200" cy="150" r="12" fill="var(--accent)"/>
    </svg>
  );
};

/* global React, ReactDOM, Header, Hero, Modules, Showcase, BIM, Cases, Pricing, Blog, Footer */
const { useEffect: useEffectApp } = React;

const REQUIRED = ['Header', 'Hero', 'Modules', 'Showcase', 'BIM', 'Cases', 'Pricing', 'Blog', 'Footer'];

const App = () => (
  <>
    <Header/>
    <main>
      <Hero/>
      <hr className="rule"/>
      <Modules/>
      <Showcase/>
      <BIM/>
      <Cases/>
      <Pricing/>
      <Blog/>
    </main>
    <Footer/>
  </>
);

(function mount() {
  var POLL = 200, MAX = 14000, start = Date.now();
  var timer = setInterval(function() {
    var ready = REQUIRED.every(function(g) { return typeof window[g] === 'function'; });
    var out = Date.now() - start > MAX;
    if (ready || out) {
      clearInterval(timer);
      var root = document.getElementById('root');
      if (root && root.childElementCount === 0) {
        ReactDOM.createRoot(root).render(React.createElement(App));
      }
    }
  }, POLL);
})();
</script>
