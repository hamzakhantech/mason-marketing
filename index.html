<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        var KEY = "mason-theme";
        var saved = null;
        try {
          saved = localStorage.getItem(KEY);
        } catch (e) {}
        var theme;
        if (saved === "dark" || saved === "light") {
          theme = saved;
        } else {
          try {
            theme =
              window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
                ? "light"
                : "dark";
          } catch (e2) {
            theme = "dark";
          }
        }
        var root = document.documentElement;
        root.setAttribute("data-theme", theme);
        if (theme === "dark") root.classList.add("dark");
        else root.classList.remove("dark");
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/mason_mark_grid.png" />
    <title>MASON — Construction Management Built to Win</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.17/dist/lenis.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
