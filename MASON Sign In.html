<!doctype html>
<html lang="en">
<head>
  <script src="theme-init.js?v=1"></script>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · MASON</title>
  <link rel="icon" type="image/png" href="assets/mason_mark_grid.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-extra.css" />
  <link rel="stylesheet" href="styles-theme.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="icons.jsx?v=3"></script>
  <script type="text/babel" src="auth.jsx?v=2"></script>
  <script type="text/babel">
    function SignInPage() {
      const [show, setShow] = React.useState(false);
      return (
        <AuthShell visual={<SignInVisual />}>
          <form className="auth-form" onSubmit={(e) => e.preventDefault()}>
            <div className="auth-form__title">
              <h1>Welcome back.</h1>
              <p>Sign in to your MASON workspace.</p>
            </div>

            <fieldset>
              <div className="field">
                <label htmlFor="email">Email</label>
                <input id="email" type="email" autoComplete="email" placeholder="you@yourcompany.com" />
              </div>
              <div className="field">
                <label htmlFor="pwd">Password</label>
                <div className="auth-pwd">
                  <input id="pwd" type={show ? "text" : "password"} autoComplete="current-password" placeholder="••••••••••" />
                  <button type="button" className="auth-pwd__toggle" onClick={() => setShow(!show)}>
                    {show ? "Hide" : "Show"}
                  </button>
                </div>
              </div>
            </fieldset>

            <div className="auth-form__between">
              <label className="checkbox">
                <input type="checkbox" defaultChecked /> Remember this device
              </label>
              <a href="MASON Forgot Password.html" style={{ color: "var(--accent)", fontWeight: 600 }}>Forgot password?</a>
            </div>

            <button className="btn btn-primary" type="submit">
              Sign in <IconArrowRight size={16} stroke={2} />
            </button>

            <div className="auth-form__divider">or</div>

            <div className="auth-sso">
              <button type="button"><IconKey size={16} /> SSO / SAML</button>
              <button type="button"><IconShield size={16} /> Microsoft</button>
            </div>

            <div className="auth-form__foot">
              New to MASON? <a href="MASON Register.html">Create an account →</a>
            </div>
          </form>
        </AuthShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<SignInPage />);
  </script>
</body>
</html>
