<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create account · MASON</title>
  <link rel="icon" type="image/png" href="assets/mason_mark_grid.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="styles-extra.css" />
  <link rel="stylesheet" href="styles-theme.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="icons.jsx?v=2"></script>
  <script type="text/babel" src="auth.jsx?v=2"></script>
  <script type="text/babel">
    function RegisterPage() {
      const [show, setShow] = React.useState(false);
      return (
        <AuthShell visual={<RegisterVisual />}>
          <form className="auth-form" onSubmit={(e) => e.preventDefault()}>
            <div className="auth-steps">
              <b>01 Account</b><i>—</i><span>02 Workspace</span><i>—</i><span>03 Invite team</span>
            </div>

            <div className="auth-form__title">
              <h1>Create your MASON account.</h1>
              <p>One workspace. Every project, surface, and module.</p>
            </div>

            <fieldset>
              <div className="field-row">
                <div className="field">
                  <label htmlFor="fn">First name</label>
                  <input id="fn" type="text" autoComplete="given-name" placeholder="Marta" />
                </div>
                <div className="field">
                  <label htmlFor="ln">Last name</label>
                  <input id="ln" type="text" autoComplete="family-name" placeholder="Reis" />
                </div>
              </div>
              <div className="field">
                <label htmlFor="company">Company</label>
                <input id="company" type="text" autoComplete="organization" placeholder="Acme Construction" />
              </div>
              <div className="field">
                <label htmlFor="email">Work email</label>
                <input id="email" type="email" autoComplete="email" placeholder="you@yourcompany.com" />
              </div>
              <div className="field">
                <label htmlFor="role">Role</label>
                <select id="role" defaultValue="">
                  <option value="" disabled>Select role…</option>
                  <option>Project manager / engineer</option>
                  <option>Superintendent / owner's rep</option>
                  <option>Foreman / field staff</option>
                  <option>Executive / portfolio lead</option>
                  <option>Other</option>
                </select>
              </div>
              <div className="field">
                <label htmlFor="pwd">Password</label>
                <div className="auth-pwd">
                  <input id="pwd" type={show ? "text" : "password"} autoComplete="new-password" placeholder="At least 12 characters" />
                  <button type="button" className="auth-pwd__toggle" onClick={() => setShow(!show)}>
                    {show ? "Hide" : "Show"}
                  </button>
                </div>
              </div>
            </fieldset>

            <label className="checkbox" style={{ fontSize: 12.5 }}>
              <input type="checkbox" /> I agree to the <a href="terms.html" style={{ color: "var(--accent)" }}>Terms</a> and <a href="privacy.html" style={{ color: "var(--accent)" }}>Privacy Policy</a>.
            </label>

            <button className="btn btn-primary" type="submit">
              Continue to workspace <IconArrowRight size={16} stroke={2} />
            </button>

            <div className="auth-form__divider">or</div>
            <div className="auth-sso">
              <button type="button"><IconKey size={16} /> SSO / SAML</button>
              <button type="button"><IconShield size={16} /> Microsoft</button>
            </div>

            <div className="auth-form__foot">
              Already have an account? <a href="MASON Sign In.html">Sign in →</a>
            </div>
          </form>
        </AuthShell>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<RegisterPage />);
  </script>
</body>
</html>
