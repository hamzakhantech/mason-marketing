  <style>
    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 4rem;
      align-items: start;
    }
    @media (max-width: 860px) {
      .contact-layout { grid-template-columns: 1fr; }
    }
    .contact-form__row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 560px) {
      .contact-form__row { grid-template-columns: 1fr; }
    }
    .contact-form__field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 1.25rem;
    }
    .contact-form__field label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }
    .contact-form__radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .contact-form__radio {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
    }
    .contact-form__radio input[type="radio"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
    }
    .contact-info {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .contact-info-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }
    .contact-info-card h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .contact-email {
      display: block;
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
      text-decoration: none;
    }
    .contact-email:hover { text-decoration: underline; }
    .contact-info-note {
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.65;
    }
    .contact-expect-list {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .contact-expect-list li {
      font-size: 13.5px;
      color: var(--text-muted);
      padding-left: 1.25rem;
      position: relative;
    }
    .contact-expect-list li::before {
      content: "·";
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }
    .contact-success {
      text-align: center;
      max-width: 520px;
      margin: 0 auto;
      padding: 4rem 0;
    }
    .contact-success__icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(232,148,46,.15);
      color: var(--accent);
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .contact-success h2 { margin-bottom: 1rem; }
    .contact-success p { color: var(--text-muted); font-size: 15px; }
    .contact-success a { color: var(--accent); }
  </style>
</head>
