  <style>
    .about-mission {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
      padding: 3rem 0;
    }
    .about-mission__quote {
      font-size: clamp(1.15rem, 2.5vw, 1.5rem);
      font-style: italic;
      line-height: 1.7;
      color: var(--text-base);
      margin-bottom: 1.25rem;
      position: relative;
      padding: 0 1.5rem;
    }
    .about-mission__quote::before {
      content: "\201C";
      position: absolute;
      left: -0.5rem;
      top: -0.5rem;
      font-size: 4rem;
      color: var(--accent);
      line-height: 1;
      font-style: normal;
    }
    .about-mission__attr {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .about-stats-card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem;
    }
    .about-stat { text-align: center; }
    .about-stat__value { display: block; font-size: 2rem; font-weight: 700; }
    .about-stat__label { display: block; font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .values-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-top: 2.5rem;
    }
    .value-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      transition: border-color .2s;
    }
    .value-card:hover { border-color: var(--accent-tint); }
    .value-card__heading { font-size: 16px; font-weight: 600; margin-bottom: .75rem; }
    .value-card__body { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
  </style>
</head>
